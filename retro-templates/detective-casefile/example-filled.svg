<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 1100" width="800" height="1100">
  <defs>
    <style>
      .masthead { font-family: 'Courier New', monospace; font-size: 38px; font-weight: bold; letter-spacing: 4px; }
      .tagline { font-family: 'Courier New', monospace; font-size: 11px; text-transform: uppercase; letter-spacing: 3px; }
      .meta { font-family: 'Courier New', monospace; font-size: 10px; }
      .section-header { font-family: 'Courier New', monospace; font-size: 12px; font-weight: bold; text-transform: uppercase; letter-spacing: 2px; }
      .headline-small { font-family: 'Courier New', monospace; font-size: 12px; font-weight: bold; }
      .body-text { font-family: 'Courier New', monospace; font-size: 9px; }
      .body-text-sm { font-family: 'Courier New', monospace; font-size: 8px; }
      .placeholder { font-family: 'Courier New', monospace; font-size: 10px; fill: #8b0000; font-style: italic; }
      .filled { font-family: 'Courier New', monospace; font-size: 10px; fill: #3d2b1f; }
      .filled-sm { font-family: 'Courier New', monospace; font-size: 9px; fill: #3d2b1f; }
      .filled-xs { font-family: 'Courier New', monospace; font-size: 8px; fill: #3d2b1f; }
      .label { font-family: 'Courier New', monospace; font-size: 8px; fill: #888; }
      .quote { font-family: 'Courier New', monospace; font-size: 9px; fill: #3d2b1f; font-style: italic; }
    </style>
  </defs>

  <!-- Background - aged manila folder -->
  <rect width="800" height="1100" fill="#f0e6d3"/>
  <!-- Coffee stain decoration -->
  <circle cx="720" cy="980" r="30" fill="#d4c4a8" opacity="0.4"/>
  <circle cx="725" cy="975" r="25" fill="#f0e6d3" opacity="0.8"/>

  <!-- Border - folder tabs style -->
  <rect x="15" y="15" width="770" height="1070" fill="none" stroke="#5c3d1e" stroke-width="2"/>
  <rect x="20" y="20" width="760" height="1060" fill="none" stroke="#5c3d1e" stroke-width="0.5"/>

  <!-- Masthead - dark brown -->
  <rect x="25" y="25" width="750" height="85" fill="#3d2b1f"/>
  <text x="400" y="58" text-anchor="middle" class="masthead" fill="#f0e6d3">THE CHECKOUT INCIDENT</text>
  <text x="400" y="78" text-anchor="middle" class="tagline" fill="#a08060">CLASSIFIED - Team Payments Eyes Only</text>
  <text x="400" y="95" text-anchor="middle" font-family="monospace" font-size="9" fill="#a08060">UNAUTHORIZED ACCESS WILL RESULT IN MANDATORY CODE REVIEW</text>

  <!-- Meta line -->
  <rect x="25" y="110" width="750" height="20" fill="#e8dcc8"/>
  <text x="35" y="123" class="meta">Case No. 047 | Sprint 12 | March 2026</text>
  <text x="765" y="123" text-anchor="end" class="meta">Filed by: Team Payments | Status: CLOSED</text>

  <!-- CLASSIFIED stamp -->
  <g transform="translate(710,40) rotate(-15)">
    <rect x="-35" y="-12" width="70" height="24" rx="2" fill="none" stroke="#8b0000" stroke-width="2"/>
    <text x="0" y="5" text-anchor="middle" fill="#8b0000" font-size="11" font-family="monospace" font-weight="bold">CLASSIFIED</text>
  </g>

  <!-- ==================== CASE SUMMARY ==================== -->
  <rect x="25" y="135" width="750" height="255" fill="#faf5ed" stroke="#5c3d1e" stroke-width="0.5"/>
  <text x="400" y="160" text-anchor="middle" class="section-header" fill="#3d2b1f">CASE SUMMARY</text>
  <line x1="300" y1="165" x2="500" y2="165" stroke="#8b0000" stroke-width="1"/>

  <!-- Headline -->
  <rect x="40" y="175" width="720" height="45" fill="#fdf8f0" stroke="#c0a880" stroke-dasharray="4"/>
  <text x="400" y="202" text-anchor="middle" font-family="'Courier New', monospace" font-size="14" font-weight="bold" fill="#3d2b1f">THE CASE OF THE VANISHING CART ITEMS</text>

  <!-- Case briefing -->
  <rect x="40" y="230" width="350" height="145" fill="#fdf8f0" stroke="#c0a880" stroke-dasharray="4"/>
  <text x="55" y="250" class="filled-sm">On the morning of February 18th,</text>
  <text x="55" y="262" class="filled-sm">multiple reports came in from the</text>
  <text x="55" y="274" class="filled-sm">field: users were adding items to</text>
  <text x="55" y="286" class="filled-sm">their cart, proceeding to checkout,</text>
  <text x="55" y="298" class="filled-sm">and finding... nothing. The cart was</text>
  <text x="55" y="310" class="filled-sm">empty. No error messages. No traces.</text>
  <text x="55" y="322" class="filled-sm">Items simply vanished into the void.</text>
  <text x="55" y="334" class="filled-sm">Initial suspects: a rogue cache</text>
  <text x="55" y="346" class="filled-sm">invalidation and a suspiciously</text>
  <text x="55" y="358" class="filled-sm">recent deployment. The investigation</text>
  <text x="55" y="370" class="filled-sm">took four days and three teams.</text>

  <!-- Evidence board area -->
  <rect x="410" y="230" width="350" height="145" fill="#fdf8f0" stroke="#c0a880" stroke-dasharray="4"/>
  <!-- Pin decorations -->
  <circle cx="430" cy="245" r="4" fill="#cc0000"/>
  <circle cx="740" cy="245" r="4" fill="#cc0000"/>
  <circle cx="430" cy="360" r="4" fill="#cc0000"/>
  <circle cx="740" cy="360" r="4" fill="#cc0000"/>
  <!-- String between pins -->
  <line x1="430" y1="245" x2="740" y2="360" stroke="#cc0000" stroke-width="0.5" opacity="0.4"/>
  <line x1="740" y1="245" x2="430" y2="360" stroke="#cc0000" stroke-width="0.5" opacity="0.4"/>

  <!-- Evidence board nodes -->
  <rect x="440" y="265" width="90" height="30" rx="3" fill="#fff8e1" stroke="#5c3d1e" stroke-width="1"/>
  <text x="485" y="284" text-anchor="middle" class="filled-xs">Deploy Feb 17</text>

  <line x1="530" y1="280" x2="565" y2="295" stroke="#cc0000" stroke-width="1.5"/>
  <text x="548" y="290" fill="#cc0000" font-size="8" font-family="monospace">--></text>

  <rect x="565" y="280" width="80" height="30" rx="3" fill="#fff8e1" stroke="#5c3d1e" stroke-width="1"/>
  <text x="605" y="299" text-anchor="middle" class="filled-xs">Cache flush</text>

  <line x1="605" y1="310" x2="585" y2="325" stroke="#cc0000" stroke-width="1.5"/>

  <rect x="510" y="320" width="100" height="30" rx="3" fill="#fff8e1" stroke="#8b0000" stroke-width="1.5"/>
  <text x="560" y="339" text-anchor="middle" class="filled-xs">Race condition</text>

  <line x1="610" y1="335" x2="645" y2="340" stroke="#cc0000" stroke-width="1.5"/>

  <rect x="645" y="325" width="85" height="30" rx="3" fill="#ffe0e0" stroke="#8b0000" stroke-width="1.5"/>
  <text x="687" y="344" text-anchor="middle" class="filled-xs">Empty carts!</text>

  <!-- ==================== SECONDARY ==================== -->
  <line x1="25" y1="395" x2="775" y2="395" stroke="#5c3d1e" stroke-width="0.5"/>

  <!-- Witness Statements -->
  <rect x="25" y="400" width="245" height="200" fill="#faf5ed" stroke="#5c3d1e" stroke-width="0.5"/>
  <text x="147" y="420" text-anchor="middle" class="section-header" fill="#3d2b1f">WITNESS STATEMENT</text>
  <rect x="35" y="432" width="225" height="30" fill="#fdf8f0" stroke="#c0a880" stroke-dasharray="4"/>
  <text x="147" y="452" text-anchor="middle" class="filled-sm">Dev Lead, Tuesday</text>
  <rect x="35" y="470" width="225" height="120" fill="#fdf8f0" stroke="#c0a880" stroke-dasharray="4"/>
  <text x="45" y="488" class="quote">"I was debugging a</text>
  <text x="45" y="500" class="quote">completely unrelated</text>
  <text x="45" y="512" class="quote">feature when Slack</text>
  <text x="45" y="524" class="quote">exploded. Within 20 min</text>
  <text x="45" y="536" class="quote">I had 15 DMs, 3 threads,</text>
  <text x="45" y="548" class="quote">and a meeting invite</text>
  <text x="45" y="560" class="quote">titled 'URGENT'. The logs</text>
  <text x="45" y="572" class="quote">showed nothing unusual</text>
  <text x="45" y="584" class="quote">- that's what made it</text>
  <text x="45" y="596" class="quote">terrifying."</text>

  <!-- Forensic Analysis -->
  <rect x="277" y="400" width="245" height="200" fill="#faf5ed" stroke="#5c3d1e" stroke-width="0.5"/>
  <text x="400" y="420" text-anchor="middle" class="section-header" fill="#3d2b1f">FORENSIC ANALYSIS</text>
  <rect x="287" y="432" width="225" height="30" fill="#fdf8f0" stroke="#c0a880" stroke-dasharray="4"/>
  <text x="400" y="452" text-anchor="middle" class="filled-sm">Race Condition in Cart Service</text>
  <rect x="287" y="470" width="225" height="120" fill="#fdf8f0" stroke="#c0a880" stroke-dasharray="4"/>
  <text x="297" y="488" class="filled-xs">Analysis of the event logs</text>
  <text x="297" y="500" class="filled-xs">revealed a 200ms window</text>
  <text x="297" y="512" class="filled-xs">between cart validation and</text>
  <text x="297" y="524" class="filled-xs">checkout initiation. During</text>
  <text x="297" y="536" class="filled-xs">high traffic, the cart TTL</text>
  <text x="297" y="548" class="filled-xs">expired before the checkout</text>
  <text x="297" y="560" class="filled-xs">service read it. The fix was</text>
  <text x="297" y="572" class="filled-xs">embarrassingly simple: extend</text>
  <text x="297" y="584" class="filled-xs">the TTL from 5 to 30 seconds.</text>
  <text x="297" y="596" class="filled-xs">Total code change: 1 line.</text>

  <!-- Suspect Profile -->
  <rect x="529" y="400" width="246" height="200" fill="#faf5ed" stroke="#5c3d1e" stroke-width="0.5"/>
  <text x="652" y="420" text-anchor="middle" class="section-header" fill="#8b0000">SUSPECT PROFILE</text>
  <text x="652" y="433" text-anchor="middle" class="label">(Root Cause Analysis)</text>

  <!-- Mugshot area with TTL=5s -->
  <rect x="539" y="445" width="80" height="80" fill="#fdf8f0" stroke="#c0a880" stroke-dasharray="4"/>
  <circle cx="579" cy="480" r="25" fill="none" stroke="#5c3d1e" stroke-width="1.5"/>
  <text x="579" y="478" text-anchor="middle" font-family="'Courier New', monospace" font-size="10" font-weight="bold" fill="#8b0000">TTL</text>
  <text x="579" y="490" text-anchor="middle" font-family="'Courier New', monospace" font-size="10" font-weight="bold" fill="#8b0000">=5s</text>

  <!-- Suspect details -->
  <rect x="625" y="445" width="140" height="80" fill="#fdf8f0" stroke="#c0a880" stroke-dasharray="4"/>
  <text x="635" y="465" class="filled-xs">Name: Cache</text>
  <text x="635" y="477" class="filled-xs">  Configuration</text>
  <text x="635" y="493" class="filled-xs">Motive: Aggressive</text>
  <text x="635" y="505" class="filled-xs">  optimization</text>
  <text x="635" y="521" class="filled-xs">Method: Silent</text>
  <text x="635" y="533" class="filled-xs">  expiration at peak</text>

  <rect x="539" y="535" width="226" height="55" fill="#fdf8f0" stroke="#c0a880" stroke-dasharray="4"/>
  <text x="549" y="553" class="filled-xs">The real culprit wasn't malice</text>
  <text x="549" y="565" class="filled-xs">- it was a well-intentioned</text>
  <text x="549" y="577" class="filled-xs">performance optimization from</text>
  <text x="549" y="589" class="filled-xs">6 months ago that nobody documented.</text>

  <!-- ==================== SMALL SECTIONS ==================== -->
  <line x1="25" y1="605" x2="775" y2="605" stroke="#5c3d1e" stroke-width="0.5"/>

  <!-- Cold Cases -->
  <rect x="25" y="610" width="185" height="150" fill="#faf5ed" stroke="#5c3d1e" stroke-width="0.5"/>
  <text x="117" y="628" text-anchor="middle" class="section-header" fill="#3d2b1f">COLD CASES</text>
  <text x="117" y="641" text-anchor="middle" class="label">(Unresolved from past)</text>
  <rect x="35" y="650" width="165" height="100" fill="#fdf8f0" stroke="#c0a880" stroke-dasharray="4"/>
  <text x="45" y="668" class="filled-xs">The phantom 502 errors</text>
  <text x="45" y="680" class="filled-xs">on the supplier API</text>
  <text x="45" y="692" class="filled-xs">remain unsolved.</text>
  <text x="45" y="704" class="filled-xs">Appearing every Tuesday</text>
  <text x="45" y="716" class="filled-xs">at 3am. We suspect a</text>
  <text x="45" y="728" class="filled-xs">cron job somewhere.</text>
  <text x="45" y="740" class="filled-xs">Investigation ongoing.</text>

  <!-- Commendations (Kudos) -->
  <rect x="217" y="610" width="185" height="150" fill="#faf5ed" stroke="#5c3d1e" stroke-width="0.5"/>
  <text x="310" y="628" text-anchor="middle" class="section-header" fill="#3d2b1f">COMMENDATIONS</text>
  <text x="310" y="641" text-anchor="middle" class="label">(Officer of the Sprint)</text>
  <rect x="227" y="650" width="165" height="100" fill="#e8f5e9" stroke="#c0a880" stroke-dasharray="4"/>
  <text x="237" y="668" class="filled-xs">Officer of the Sprint:</text>
  <text x="237" y="680" class="filled-xs">Jun, who wrote the</text>
  <text x="237" y="692" class="filled-xs">reproduction script in</text>
  <text x="237" y="704" class="filled-xs">30 minutes that would</text>
  <text x="237" y="716" class="filled-xs">have taken anyone else</text>
  <text x="237" y="728" class="filled-xs">a day. Also brought</text>
  <text x="237" y="740" class="filled-xs">donuts to the war room.</text>

  <!-- Precinct Morale (Mood) -->
  <rect x="409" y="610" width="185" height="150" fill="#faf5ed" stroke="#5c3d1e" stroke-width="0.5"/>
  <text x="502" y="628" text-anchor="middle" class="section-header" fill="#3d2b1f">PRECINCT MORALE</text>
  <rect x="419" y="645" width="165" height="105" fill="#fdf8f0" stroke="#c0a880" stroke-dasharray="4"/>
  <text x="429" y="663" class="filled-xs">Started at DEFCON 2,</text>
  <text x="429" y="675" class="filled-xs">ended at 'cautiously</text>
  <text x="429" y="687" class="filled-xs">optimistic.' The team</text>
  <text x="429" y="699" class="filled-xs">rallied hard during</text>
  <text x="429" y="711" class="filled-xs">the incident but needs</text>
  <text x="429" y="723" class="filled-xs">a quieter sprint to</text>
  <text x="429" y="735" class="filled-xs">recover.</text>

  <!-- Active Investigations -->
  <rect x="601" y="610" width="174" height="150" fill="#faf5ed" stroke="#5c3d1e" stroke-width="0.5"/>
  <text x="688" y="628" text-anchor="middle" class="section-header" fill="#3d2b1f">ACTIVE CASES</text>
  <rect x="611" y="645" width="154" height="105" fill="#fdf8f0" stroke="#c0a880" stroke-dasharray="4"/>
  <text x="621" y="663" class="filled-xs">API rate limiting</text>
  <text x="621" y="675" class="filled-xs">investigation. Some</text>
  <text x="621" y="687" class="filled-xs">clients are hitting</text>
  <text x="621" y="699" class="filled-xs">us 10x more than</text>
  <text x="621" y="711" class="filled-xs">expected. Need to</text>
  <text x="621" y="723" class="filled-xs">understand why before</text>
  <text x="621" y="735" class="filled-xs">we enforce limits.</text>

  <!-- ==================== BOTTOM ==================== -->
  <line x1="25" y1="765" x2="775" y2="765" stroke="#5c3d1e" stroke-width="0.5"/>

  <!-- Most Wanted -->
  <rect x="25" y="770" width="370" height="160" fill="#faf5ed" stroke="#5c3d1e" stroke-width="0.5"/>
  <text x="210" y="790" text-anchor="middle" class="section-header" fill="#8b0000">MOST WANTED</text>
  <text x="210" y="803" text-anchor="middle" class="label">(Top Priorities / Help Needed)</text>

  <rect x="35" y="810" width="170" height="55" fill="#fdf8f0" stroke="#8b0000" stroke-dasharray="4"/>
  <text x="45" y="825" class="filled-xs">WANTED: Better</text>
  <text x="45" y="837" class="filled-xs">observability on the</text>
  <text x="45" y="849" class="filled-xs">cart service.</text>
  <text x="45" y="861" class="label">Reward: fewer 2am pages</text>

  <rect x="215" y="810" width="170" height="55" fill="#fdf8f0" stroke="#8b0000" stroke-dasharray="4"/>
  <text x="225" y="825" class="filled-xs">WANTED: Documentation</text>
  <text x="225" y="837" class="filled-xs">for the cache layer.</text>
  <text x="225" y="849" class="filled-xs">Last updated:</text>
  <text x="225" y="861" class="label">"never, apparently."</text>

  <rect x="35" y="870" width="345" height="50" fill="#fdf8f0" stroke="#c0a880" stroke-dasharray="4"/>
  <text x="45" y="888" class="filled-xs">INFORMANT TIP: If you know who set</text>
  <text x="45" y="900" class="filled-xs">TTL=5s, please come forward.</text>
  <text x="45" y="912" class="filled-xs">No questions asked.</text>

  <!-- Case Statistics -->
  <rect x="402" y="770" width="373" height="160" fill="#faf5ed" stroke="#5c3d1e" stroke-width="0.5"/>
  <text x="588" y="790" text-anchor="middle" class="section-header" fill="#3d2b1f">CASE STATISTICS</text>
  <text x="588" y="803" text-anchor="middle" class="label">(Precinct Numbers)</text>
  <rect x="412" y="815" width="353" height="105" fill="#fdf8f0" stroke="#c0a880" stroke-dasharray="4"/>
  <text x="430" y="840" class="filled-sm">Cases closed:            14</text>
  <text x="430" y="856" class="filled-sm">Cases opened:            11</text>
  <text x="430" y="872" class="filled-sm">Evidence collected (PRs): 22</text>
  <text x="430" y="888" class="filled-sm">Suspects cleared:         3</text>
  <text x="430" y="904" class="filled-sm">Donuts consumed:         24</text>
  <text x="625" y="916" class="label">(incident tax)</text>

  <!-- ==================== FOOTER ==================== -->
  <line x1="25" y1="935" x2="775" y2="935" stroke="#5c3d1e" stroke-width="0.5"/>

  <!-- Overheard in the Precinct -->
  <rect x="25" y="940" width="500" height="55" fill="#faf5ed" stroke="#5c3d1e" stroke-width="0.5"/>
  <text x="275" y="960" text-anchor="middle" class="section-header" fill="#3d2b1f">OVERHEARD IN THE PRECINCT</text>
  <rect x="35" y="970" width="480" height="20" fill="#fdf8f0" stroke="#c0a880" stroke-dasharray="4"/>
  <text x="275" y="984" text-anchor="middle" class="quote">"The TTL was set to 5 seconds? FIVE? Who hurt you?" - Jun</text>

  <!-- Sketch Artist -->
  <rect x="532" y="940" width="243" height="55" fill="#faf5ed" stroke="#5c3d1e" stroke-width="0.5"/>
  <text x="653" y="960" text-anchor="middle" class="section-header" fill="#3d2b1f">SKETCH ARTIST</text>
  <rect x="542" y="968" width="223" height="22" fill="#fdf8f0" stroke="#c0a880" stroke-dasharray="4"/>
  <!-- Tombstone sketch -->
  <rect x="620" y="970" width="40" height="17" rx="8" fill="none" stroke="#5c3d1e" stroke-width="1"/>
  <text x="640" y="981" text-anchor="middle" font-family="'Courier New', monospace" font-size="6" fill="#3d2b1f">RIP</text>
  <text x="670" y="977" class="filled-xs">TTL=5s</text>
  <text x="670" y="987" class="label">2025-2026</text>

  <text x="400" y="1015" text-anchor="middle" class="meta">Filed at Acme Corp Precinct HQ | No caches were harmed in the resolution of this case</text>
  <text x="765" y="1070" text-anchor="end" class="meta">Case 047 | Status: CLOSED</text>

  <!-- Folder tab decoration -->
  <rect x="300" y="15" width="200" height="12" rx="2" fill="#5c3d1e"/>
  <text x="400" y="24" text-anchor="middle" fill="#f0e6d3" font-size="8" font-family="monospace">SPRINT 12 CASE FILES</text>

  <text x="35" y="1035" class="label">Detectives: Jun, Maria, Tom, Aisha &amp; the Payments squad | Case Status: CLOSED</text>
</svg>
