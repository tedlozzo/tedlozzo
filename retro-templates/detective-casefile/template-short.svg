<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 780" width="800" height="780">
  <defs>
    <style>
      .masthead { font-family: 'Courier New', monospace; font-size: 38px; font-weight: bold; letter-spacing: 4px; }
      .tagline { font-family: 'Courier New', monospace; font-size: 11px; text-transform: uppercase; letter-spacing: 3px; }
      .meta { font-family: 'Courier New', monospace; font-size: 10px; }
      .section-header { font-family: 'Courier New', monospace; font-size: 12px; font-weight: bold; text-transform: uppercase; letter-spacing: 2px; }
      .headline-small { font-family: 'Courier New', monospace; font-size: 12px; font-weight: bold; }
      .body-text { font-family: 'Courier New', monospace; font-size: 9px; }
      .placeholder { font-family: 'Courier New', monospace; font-size: 10px; fill: #8b0000; font-style: italic; }
      .label { font-family: 'Courier New', monospace; font-size: 8px; fill: #888; }
    </style>
  </defs>

  <!-- Background - aged manila folder -->
  <rect width="800" height="780" fill="#f0e6d3"/>
  <!-- Coffee stain decoration -->
  <circle cx="720" cy="680" r="30" fill="#d4c4a8" opacity="0.4"/>
  <circle cx="725" cy="675" r="25" fill="#f0e6d3" opacity="0.8"/>

  <!-- Border - folder tabs style -->
  <rect x="15" y="15" width="770" height="750" fill="none" stroke="#5c3d1e" stroke-width="2"/>
  <rect x="20" y="20" width="760" height="740" fill="none" stroke="#5c3d1e" stroke-width="0.5"/>

  <!-- Masthead - dark brown -->
  <rect x="25" y="25" width="750" height="85" fill="#3d2b1f"/>
  <text x="400" y="58" text-anchor="middle" class="masthead" fill="#f0e6d3">[CASE FILE NAME]</text>
  <text x="400" y="78" text-anchor="middle" class="tagline" fill="#a08060">CLASSIFIED - [Team Name] Eyes Only</text>
  <text x="400" y="95" text-anchor="middle" font-family="monospace" font-size="9" fill="#a08060">UNAUTHORIZED ACCESS WILL RESULT IN MANDATORY CODE REVIEW</text>

  <!-- Meta line -->
  <rect x="25" y="110" width="750" height="20" fill="#e8dcc8"/>
  <text x="35" y="123" class="meta">Case No. [XXX] | Sprint [XX] | [Date]</text>
  <text x="765" y="123" text-anchor="end" class="meta">Filed by: [Team Name] | Status: [OPEN/CLOSED]</text>

  <!-- CLASSIFIED stamp -->
  <g transform="translate(710,40) rotate(-15)">
    <rect x="-35" y="-12" width="70" height="24" rx="2" fill="none" stroke="#8b0000" stroke-width="2"/>
    <text x="0" y="5" text-anchor="middle" fill="#8b0000" font-size="11" font-family="monospace" font-weight="bold">CLASSIFIED</text>
  </g>

  <!-- Folder tab decoration -->
  <rect x="300" y="15" width="200" height="12" rx="2" fill="#5c3d1e"/>
  <text x="400" y="24" text-anchor="middle" fill="#f0e6d3" font-size="8" font-family="monospace">SPRINT [XX] CASE FILES</text>

  <!-- ==================== CASE SUMMARY ==================== -->
  <rect x="25" y="135" width="750" height="255" fill="#faf5ed" stroke="#5c3d1e" stroke-width="0.5"/>
  <text x="400" y="160" text-anchor="middle" class="section-header" fill="#3d2b1f">CASE SUMMARY</text>
  <line x1="300" y1="165" x2="500" y2="165" stroke="#8b0000" stroke-width="1"/>

  <rect x="40" y="175" width="720" height="45" fill="#fdf8f0" stroke="#c0a880" stroke-dasharray="4"/>
  <text x="400" y="202" text-anchor="middle" class="placeholder">[CASE HEADLINE - What's the main story of this sprint?]</text>

  <rect x="40" y="230" width="350" height="145" fill="#fdf8f0" stroke="#c0a880" stroke-dasharray="4"/>
  <text x="215" y="260" text-anchor="middle" class="placeholder">[Case briefing]</text>
  <text x="215" y="278" text-anchor="middle" class="placeholder">What happened? Who's involved?</text>
  <text x="215" y="296" text-anchor="middle" class="placeholder">What evidence do we have?</text>
  <text x="215" y="325" text-anchor="middle" class="label">~100-150 words</text>

  <!-- Evidence board area -->
  <rect x="410" y="230" width="350" height="145" fill="#fdf8f0" stroke="#c0a880" stroke-dasharray="4"/>
  <!-- Pin decorations -->
  <circle cx="430" cy="245" r="4" fill="#cc0000"/>
  <circle cx="740" cy="245" r="4" fill="#cc0000"/>
  <circle cx="430" cy="360" r="4" fill="#cc0000"/>
  <circle cx="740" cy="360" r="4" fill="#cc0000"/>
  <!-- String between pins -->
  <line x1="430" y1="245" x2="740" y2="360" stroke="#cc0000" stroke-width="0.5" opacity="0.4"/>
  <line x1="740" y1="245" x2="430" y2="360" stroke="#cc0000" stroke-width="0.5" opacity="0.4"/>
  <text x="585" y="305" text-anchor="middle" class="placeholder">[EVIDENCE BOARD]</text>
  <text x="585" y="320" text-anchor="middle" class="label">Connect the dots. Pin your evidence.</text>

  <!-- ==================== SMALL SECTIONS ROW ==================== -->
  <line x1="25" y1="395" x2="775" y2="395" stroke="#5c3d1e" stroke-width="0.5"/>

  <!-- Cold Cases -->
  <rect x="25" y="400" width="185" height="150" fill="#faf5ed" stroke="#5c3d1e" stroke-width="0.5"/>
  <text x="117" y="418" text-anchor="middle" class="section-header" fill="#3d2b1f">COLD CASES</text>
  <text x="117" y="431" text-anchor="middle" class="label">(Unresolved from past)</text>
  <rect x="35" y="440" width="165" height="100" fill="#fdf8f0" stroke="#c0a880" stroke-dasharray="4"/>
  <text x="117" y="485" text-anchor="middle" class="placeholder">[Still open...]</text>
  <text x="117" y="505" text-anchor="middle" class="label">~40 words</text>

  <!-- Commendations (Kudos) -->
  <rect x="217" y="400" width="185" height="150" fill="#faf5ed" stroke="#5c3d1e" stroke-width="0.5"/>
  <text x="310" y="418" text-anchor="middle" class="section-header" fill="#3d2b1f">COMMENDATIONS</text>
  <text x="310" y="431" text-anchor="middle" class="label">(Officer of the Sprint)</text>
  <rect x="227" y="440" width="165" height="100" fill="#e8f5e9" stroke="#c0a880" stroke-dasharray="4"/>
  <text x="310" y="485" text-anchor="middle" class="placeholder">[Who gets the badge?]</text>

  <!-- Precinct Morale (Mood) -->
  <rect x="409" y="400" width="185" height="150" fill="#faf5ed" stroke="#5c3d1e" stroke-width="0.5"/>
  <text x="502" y="418" text-anchor="middle" class="section-header" fill="#3d2b1f">PRECINCT MORALE</text>
  <rect x="419" y="435" width="165" height="105" fill="#fdf8f0" stroke="#c0a880" stroke-dasharray="4"/>
  <text x="502" y="480" text-anchor="middle" class="placeholder">[High alert? Calm?]</text>
  <text x="502" y="500" text-anchor="middle" class="placeholder">[Battle-weary? Sharp?]</text>

  <!-- Active Investigations -->
  <rect x="601" y="400" width="174" height="150" fill="#faf5ed" stroke="#5c3d1e" stroke-width="0.5"/>
  <text x="688" y="418" text-anchor="middle" class="section-header" fill="#3d2b1f">ACTIVE CASES</text>
  <rect x="611" y="435" width="154" height="105" fill="#fdf8f0" stroke="#c0a880" stroke-dasharray="4"/>
  <text x="688" y="485" text-anchor="middle" class="placeholder">[Next sprint cases]</text>
  <text x="688" y="505" text-anchor="middle" class="label">~40 words</text>

  <!-- ==================== BOTTOM: MOST WANTED & CASE STATS ==================== -->
  <line x1="25" y1="555" x2="775" y2="555" stroke="#5c3d1e" stroke-width="0.5"/>

  <!-- Most Wanted - left half -->
  <rect x="25" y="560" width="370" height="120" fill="#faf5ed" stroke="#5c3d1e" stroke-width="0.5"/>
  <text x="210" y="580" text-anchor="middle" class="section-header" fill="#8b0000">MOST WANTED</text>
  <text x="210" y="593" text-anchor="middle" class="label">(Top Priorities / Help Needed)</text>
  <rect x="35" y="600" width="350" height="70" fill="#fdf8f0" stroke="#8b0000" stroke-dasharray="4"/>
  <text x="210" y="625" text-anchor="middle" class="placeholder">[WANTED: ________]</text>
  <text x="210" y="645" text-anchor="middle" class="placeholder">[Reward: What do we gain by solving this?]</text>
  <text x="210" y="660" text-anchor="middle" class="label">Poster your top priorities here</text>

  <!-- Case Statistics - right half -->
  <rect x="402" y="560" width="373" height="120" fill="#faf5ed" stroke="#5c3d1e" stroke-width="0.5"/>
  <text x="588" y="580" text-anchor="middle" class="section-header" fill="#3d2b1f">CASE STATISTICS</text>
  <text x="588" y="593" text-anchor="middle" class="label">(Precinct Numbers)</text>
  <rect x="412" y="600" width="353" height="70" fill="#fdf8f0" stroke="#c0a880" stroke-dasharray="4"/>
  <text x="588" y="625" text-anchor="middle" class="placeholder">Cases closed: ___  Cases opened: ___</text>
  <text x="588" y="645" text-anchor="middle" class="placeholder">Evidence collected: ___  Suspects cleared: ___</text>
  <text x="588" y="660" text-anchor="middle" class="placeholder">Donuts consumed: ___</text>

  <!-- ==================== FOOTER ==================== -->
  <line x1="25" y1="685" x2="775" y2="685" stroke="#5c3d1e" stroke-width="0.5"/>

  <!-- Overheard in the Precinct - full width -->
  <rect x="25" y="690" width="750" height="45" fill="#faf5ed" stroke="#5c3d1e" stroke-width="0.5"/>
  <text x="400" y="708" text-anchor="middle" class="section-header" fill="#3d2b1f">OVERHEARD IN THE PRECINCT</text>
  <rect x="35" y="715" width="730" height="15" fill="#fdf8f0" stroke="#c0a880" stroke-dasharray="4"/>
  <text x="400" y="726" text-anchor="middle" class="placeholder">"[Most incriminating quote of the sprint]" - Detective [Name]</text>

  <text x="400" y="752" text-anchor="middle" class="meta">Filed at [Company] Precinct HQ | All suspects innocent until proven guilty | No donuts were harmed</text>
  <text x="35" y="765" class="label">Detectives: _________________ | Chief Inspector: _________________ | Case Status: _________________</text>
</svg>
