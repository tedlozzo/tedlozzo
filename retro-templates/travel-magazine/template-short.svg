<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 780" width="800" height="780">
  <defs>
    <style>
      .masthead { font-family: 'Palatino Linotype', 'Book Antiqua', Palatino, serif; font-size: 42px; font-weight: bold; }
      .tagline { font-family: 'Palatino Linotype', Palatino, serif; font-size: 12px; font-style: italic; }
      .meta { font-family: Georgia, serif; font-size: 10px; }
      .section-header { font-family: 'Palatino Linotype', Palatino, serif; font-size: 13px; font-weight: bold; text-transform: uppercase; letter-spacing: 2px; }
      .headline-small { font-family: 'Palatino Linotype', Palatino, serif; font-size: 13px; font-weight: bold; }
      .body-text { font-family: Georgia, serif; font-size: 10px; }
      .placeholder { font-family: Georgia, serif; font-size: 11px; fill: #2a7b6f; font-style: italic; }
      .label { font-family: Georgia, serif; font-size: 8px; fill: #888; }
    </style>
  </defs>

  <!-- Background - warm sand -->
  <rect width="800" height="780" fill="#faf5ed"/>

  <!-- Border - subtle coral/teal -->
  <rect x="15" y="15" width="770" height="750" fill="none" stroke="#2a7b6f" stroke-width="2"/>
  <rect x="20" y="20" width="760" height="740" fill="none" stroke="#2a7b6f" stroke-width="0.5"/>

  <!-- Masthead - teal gradient feel -->
  <rect x="25" y="25" width="750" height="85" fill="#2a7b6f"/>
  <text x="400" y="60" text-anchor="middle" class="masthead" fill="#fff">[YOUR MAGAZINE NAME]</text>
  <text x="400" y="80" text-anchor="middle" class="tagline" fill="#a0d4cc">"[Your travel motto]"</text>
  <text x="400" y="95" text-anchor="middle" font-family="Georgia" font-size="9" fill="#a0d4cc" font-style="italic">Issue [X] | Sprint [XX]</text>

  <!-- Meta line -->
  <rect x="25" y="110" width="750" height="18" fill="#e8f0ee"/>
  <text x="35" y="122" class="meta">[Team Name] | [Company] | [Date]</text>
  <text x="765" y="122" text-anchor="end" class="meta">Your journey. Your stories.</text>

  <!-- Star rating badge -->
  <rect x="715" y="35" width="50" height="45" rx="3" fill="#e87461"/>
  <text x="740" y="55" text-anchor="middle" fill="#fff" font-size="16" font-family="Georgia">*****</text>
  <text x="740" y="70" text-anchor="middle" fill="#fff" font-size="7" font-family="Georgia">RATED</text>

  <!-- ==================== DESTINATION REVIEW ==================== -->
  <rect x="25" y="133" width="750" height="257" fill="#fff" stroke="#2a7b6f" stroke-width="0.5"/>
  <text x="400" y="158" text-anchor="middle" class="section-header" fill="#2a7b6f">DESTINATION REVIEW</text>
  <line x1="280" y1="163" x2="520" y2="163" stroke="#e87461" stroke-width="1"/>

  <rect x="40" y="173" width="720" height="50" fill="#f0f7f5" stroke="#a0d4cc" stroke-dasharray="4"/>
  <text x="400" y="203" text-anchor="middle" class="placeholder">[DESTINATION HEADLINE - Where did this sprint take us?]</text>

  <rect x="40" y="233" width="350" height="142" fill="#f0f7f5" stroke="#a0d4cc" stroke-dasharray="4"/>
  <text x="215" y="263" text-anchor="middle" class="placeholder">[Destination review]</text>
  <text x="215" y="281" text-anchor="middle" class="placeholder">What did you explore? Was it worth the trip?</text>
  <text x="215" y="299" text-anchor="middle" class="placeholder">Would you recommend it to other teams?</text>
  <text x="215" y="323" text-anchor="middle" class="label">~100-150 words</text>

  <!-- Compass rose area -->
  <rect x="410" y="233" width="350" height="142" fill="#f0f7f5" stroke="#a0d4cc" stroke-dasharray="4"/>
  <!-- Simple compass -->
  <circle cx="585" cy="295" r="35" fill="none" stroke="#2a7b6f" stroke-width="0.5"/>
  <text x="585" y="270" text-anchor="middle" fill="#2a7b6f" font-size="10" font-family="Georgia">N</text>
  <text x="615" y="298" text-anchor="middle" fill="#2a7b6f" font-size="10" font-family="Georgia">E</text>
  <text x="585" y="325" text-anchor="middle" fill="#2a7b6f" font-size="10" font-family="Georgia">S</text>
  <text x="555" y="298" text-anchor="middle" fill="#2a7b6f" font-size="10" font-family="Georgia">W</text>
  <text x="585" y="355" text-anchor="middle" class="placeholder">[Photo / Map / Sketch]</text>

  <!-- ==================== SMALL SECTIONS ==================== -->
  <line x1="25" y1="395" x2="775" y2="395" stroke="#2a7b6f" stroke-width="0.5"/>

  <!-- Delayed Flights -->
  <rect x="25" y="400" width="185" height="150" fill="#fff" stroke="#2a7b6f" stroke-width="0.5"/>
  <text x="117" y="418" text-anchor="middle" class="section-header" fill="#e87461">DELAYED FLIGHTS</text>
  <rect x="35" y="430" width="165" height="110" fill="#fdf0ee" stroke="#e87461" stroke-dasharray="4"/>
  <text x="117" y="480" text-anchor="middle" class="placeholder">[What got delayed?]</text>
  <text x="117" y="500" text-anchor="middle" class="label">~40 words</text>

  <!-- Travel Companions (Kudos) -->
  <rect x="217" y="400" width="185" height="150" fill="#fff" stroke="#2a7b6f" stroke-width="0.5"/>
  <text x="310" y="418" text-anchor="middle" class="section-header" fill="#2a7b6f">TRAVEL COMPANIONS</text>
  <text x="310" y="431" text-anchor="middle" class="label">(Best travel buddy award)</text>
  <rect x="227" y="440" width="165" height="100" fill="#f0f7f5" stroke="#a0d4cc" stroke-dasharray="4"/>
  <text x="310" y="485" text-anchor="middle" class="placeholder">[Who made the trip better?]</text>

  <!-- Weather at Destination (Mood) -->
  <rect x="409" y="400" width="185" height="150" fill="#fff" stroke="#2a7b6f" stroke-width="0.5"/>
  <text x="502" y="418" text-anchor="middle" class="section-header" fill="#2a7b6f">WEATHER</text>
  <text x="502" y="431" text-anchor="middle" class="label">(At our destination)</text>
  <rect x="419" y="440" width="165" height="100" fill="#f0f7f5" stroke="#a0d4cc" stroke-dasharray="4"/>
  <text x="502" y="480" text-anchor="middle" class="placeholder">[Tropical? Clear skies?]</text>
  <text x="502" y="500" text-anchor="middle" class="placeholder">[Monsoon season?]</text>

  <!-- Coming Destinations -->
  <rect x="601" y="400" width="174" height="150" fill="#fff" stroke="#2a7b6f" stroke-width="0.5"/>
  <text x="688" y="418" text-anchor="middle" class="section-header" fill="#2a7b6f">NEXT DESTINATION</text>
  <rect x="611" y="435" width="154" height="105" fill="#f0f7f5" stroke="#a0d4cc" stroke-dasharray="4"/>
  <text x="688" y="485" text-anchor="middle" class="placeholder">[Where to next?]</text>
  <text x="688" y="505" text-anchor="middle" class="label">~40 words</text>

  <!-- ==================== BOTTOM - SIMPLIFIED ==================== -->
  <line x1="25" y1="555" x2="775" y2="555" stroke="#2a7b6f" stroke-width="0.5"/>

  <rect x="25" y="560" width="750" height="25" fill="#e8f0ee"/>
  <text x="400" y="577" text-anchor="middle" class="section-header" fill="#2a7b6f">PACKING LIST &amp; TRIP ADVISOR</text>

  <!-- Left half - Packing List -->
  <rect x="25" y="585" width="370" height="110" fill="#fff" stroke="#2a7b6f" stroke-width="0.5"/>
  <text x="210" y="603" text-anchor="middle" class="label">(Resources needed for next trip)</text>
  <rect x="35" y="610" width="350" height="75" fill="#f0f7f5" stroke="#a0d4cc" stroke-dasharray="4"/>
  <text x="210" y="635" text-anchor="middle" class="placeholder">[ ] ___________    [ ] ___________</text>
  <text x="210" y="653" text-anchor="middle" class="placeholder">[ ] ___________    [ ] ___________</text>
  <text x="210" y="673" text-anchor="middle" class="label">TRAVEL INSURANCE: What risks should we cover?</text>

  <!-- Right half - Trip Advisor -->
  <rect x="405" y="585" width="370" height="110" fill="#fff" stroke="#2a7b6f" stroke-width="0.5"/>
  <text x="590" y="603" text-anchor="middle" class="label">(Sprint Rating)</text>
  <rect x="415" y="610" width="350" height="75" fill="#f0f7f5" stroke="#a0d4cc" stroke-dasharray="4"/>
  <text x="590" y="635" text-anchor="middle" class="placeholder">Planning: ___/5  Execution: ___/5</text>
  <text x="590" y="653" text-anchor="middle" class="placeholder">Teamwork: ___/5  Overall: ___/5 stars</text>
  <text x="590" y="671" text-anchor="middle" class="placeholder">Would travel again: Y/N</text>

  <!-- ==================== FOOTER ==================== -->
  <line x1="25" y1="700" x2="775" y2="700" stroke="#2a7b6f" stroke-width="0.5"/>

  <rect x="25" y="705" width="750" height="45" fill="#fff" stroke="#2a7b6f" stroke-width="0.5"/>
  <text x="400" y="723" text-anchor="middle" class="section-header" fill="#2a7b6f">OVERHEARD AT THE AIRPORT</text>
  <rect x="35" y="730" width="730" height="15" fill="#f0f7f5" stroke="#a0d4cc" stroke-dasharray="4"/>
  <text x="400" y="742" text-anchor="middle" class="placeholder">"[Best overheard quote this sprint]" - Traveler</text>

  <text x="400" y="765" text-anchor="middle" class="meta">Published by [Company] Travel Press | Luggage not guaranteed | All journeys are one-way</text>

  <!-- Corner decorations - leaf/travel style -->
  <path d="M 30 30 Q 40 30 40 40 Q 30 40 30 30" fill="#2a7b6f" opacity="0.3"/>
  <path d="M 770 30 Q 760 30 760 40 Q 770 40 770 30" fill="#2a7b6f" opacity="0.3"/>
  <path d="M 30 750 Q 40 750 40 740 Q 30 740 30 750" fill="#2a7b6f" opacity="0.3"/>
  <path d="M 770 750 Q 760 750 760 740 Q 770 740 770 750" fill="#2a7b6f" opacity="0.3"/>
</svg>