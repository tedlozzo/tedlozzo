<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 1100" width="800" height="1100">
  <defs>
    <style>
      .masthead { font-family: 'Palatino Linotype', 'Book Antiqua', Palatino, serif; font-size: 42px; font-weight: bold; }
      .tagline { font-family: 'Palatino Linotype', Palatino, serif; font-size: 12px; font-style: italic; }
      .meta { font-family: Georgia, serif; font-size: 10px; }
      .section-header { font-family: 'Palatino Linotype', Palatino, serif; font-size: 13px; font-weight: bold; text-transform: uppercase; letter-spacing: 2px; }
      .headline-small { font-family: 'Palatino Linotype', Palatino, serif; font-size: 13px; font-weight: bold; }
      .body-text { font-family: Georgia, serif; font-size: 10px; }
      .placeholder { font-family: Georgia, serif; font-size: 11px; fill: #2a7b6f; font-style: italic; }
      .label { font-family: Georgia, serif; font-size: 8px; fill: #888; }
    </style>
  </defs>

  <!-- Background - warm sand -->
  <rect width="800" height="1100" fill="#faf5ed"/>

  <!-- Border - subtle coral/teal -->
  <rect x="15" y="15" width="770" height="1070" fill="none" stroke="#2a7b6f" stroke-width="2"/>
  <rect x="20" y="20" width="760" height="1060" fill="none" stroke="#2a7b6f" stroke-width="0.5"/>

  <!-- Masthead - teal gradient feel -->
  <rect x="25" y="25" width="750" height="85" fill="#2a7b6f"/>
  <text x="400" y="60" text-anchor="middle" class="masthead" fill="#fff">[YOUR MAGAZINE NAME]</text>
  <text x="400" y="80" text-anchor="middle" class="tagline" fill="#a0d4cc">"[Your travel motto]"</text>
  <text x="400" y="95" text-anchor="middle" font-family="Georgia" font-size="9" fill="#a0d4cc" font-style="italic">Issue [X] | Sprint [XX]</text>

  <!-- Meta line -->
  <rect x="25" y="110" width="750" height="18" fill="#e8f0ee"/>
  <text x="35" y="122" class="meta">[Team Name] | [Company] | [Date]</text>
  <text x="765" y="122" text-anchor="end" class="meta">Your journey. Your stories.</text>

  <!-- Star rating badge -->
  <rect x="715" y="35" width="50" height="45" rx="3" fill="#e87461"/>
  <text x="740" y="55" text-anchor="middle" fill="#fff" font-size="16" font-family="Georgia">*****</text>
  <text x="740" y="70" text-anchor="middle" fill="#fff" font-size="7" font-family="Georgia">RATED</text>

  <!-- ==================== DESTINATION REVIEW ==================== -->
  <rect x="25" y="133" width="750" height="257" fill="#fff" stroke="#2a7b6f" stroke-width="0.5"/>
  <text x="400" y="158" text-anchor="middle" class="section-header" fill="#2a7b6f">DESTINATION REVIEW</text>
  <line x1="280" y1="163" x2="520" y2="163" stroke="#e87461" stroke-width="1"/>

  <rect x="40" y="173" width="720" height="50" fill="#f0f7f5" stroke="#a0d4cc" stroke-dasharray="4"/>
  <text x="400" y="203" text-anchor="middle" class="placeholder">[DESTINATION HEADLINE - Where did this sprint take us?]</text>

  <rect x="40" y="233" width="350" height="142" fill="#f0f7f5" stroke="#a0d4cc" stroke-dasharray="4"/>
  <text x="215" y="263" text-anchor="middle" class="placeholder">[Destination review]</text>
  <text x="215" y="281" text-anchor="middle" class="placeholder">What did you explore? Was it worth the trip?</text>
  <text x="215" y="299" text-anchor="middle" class="placeholder">Would you recommend it to other teams?</text>
  <text x="215" y="323" text-anchor="middle" class="label">~100-150 words</text>

  <!-- Compass rose area -->
  <rect x="410" y="233" width="350" height="142" fill="#f0f7f5" stroke="#a0d4cc" stroke-dasharray="4"/>
  <!-- Simple compass -->
  <circle cx="585" cy="295" r="35" fill="none" stroke="#2a7b6f" stroke-width="0.5"/>
  <text x="585" y="270" text-anchor="middle" fill="#2a7b6f" font-size="10" font-family="Georgia">N</text>
  <text x="615" y="298" text-anchor="middle" fill="#2a7b6f" font-size="10" font-family="Georgia">E</text>
  <text x="585" y="325" text-anchor="middle" fill="#2a7b6f" font-size="10" font-family="Georgia">S</text>
  <text x="555" y="298" text-anchor="middle" fill="#2a7b6f" font-size="10" font-family="Georgia">W</text>
  <text x="585" y="355" text-anchor="middle" class="placeholder">[Photo / Map / Sketch]</text>

  <!-- ==================== SECONDARY ==================== -->
  <line x1="25" y1="395" x2="775" y2="395" stroke="#2a7b6f" stroke-width="0.5"/>

  <!-- Postcards Home -->
  <rect x="25" y="400" width="245" height="200" fill="#fff" stroke="#2a7b6f" stroke-width="0.5"/>
  <text x="147" y="420" text-anchor="middle" class="section-header" fill="#2a7b6f">POSTCARDS HOME</text>
  <!-- Postcard style boxes -->
  <rect x="35" y="432" width="225" height="75" fill="#fdf8f0" stroke="#e87461" stroke-width="0.5"/>
  <line x1="147" y1="432" x2="147" y2="507" stroke="#e87461" stroke-width="0.5" stroke-dasharray="2"/>
  <text x="90" y="465" text-anchor="middle" class="placeholder">[Message]</text>
  <text x="90" y="480" text-anchor="middle" class="label">To stakeholders</text>
  <text x="210" y="460" text-anchor="middle" class="label">TO:</text>
  <text x="210" y="480" text-anchor="middle" class="placeholder">[___________]</text>
  <rect x="35" y="515" width="225" height="75" fill="#fdf8f0" stroke="#e87461" stroke-width="0.5"/>
  <line x1="147" y1="515" x2="147" y2="590" stroke="#e87461" stroke-width="0.5" stroke-dasharray="2"/>
  <text x="90" y="550" text-anchor="middle" class="placeholder">[Message]</text>
  <text x="210" y="545" text-anchor="middle" class="label">TO:</text>
  <text x="210" y="565" text-anchor="middle" class="placeholder">[___________]</text>

  <!-- Travel Tips -->
  <rect x="277" y="400" width="245" height="200" fill="#fff" stroke="#2a7b6f" stroke-width="0.5"/>
  <text x="400" y="420" text-anchor="middle" class="section-header" fill="#2a7b6f">TRAVEL TIPS</text>
  <rect x="287" y="432" width="225" height="30" fill="#f0f7f5" stroke="#a0d4cc" stroke-dasharray="4"/>
  <text x="400" y="452" text-anchor="middle" class="placeholder">[Lesson learned]</text>
  <rect x="287" y="470" width="225" height="120" fill="#f0f7f5" stroke="#a0d4cc" stroke-dasharray="4"/>
  <text x="400" y="520" text-anchor="middle" class="placeholder">[What would you tell</text>
  <text x="400" y="535" text-anchor="middle" class="placeholder">the next traveler?]</text>
  <text x="400" y="555" text-anchor="middle" class="label">~75 words</text>

  <!-- Off the Beaten Path -->
  <rect x="529" y="400" width="246" height="200" fill="#fff" stroke="#2a7b6f" stroke-width="0.5"/>
  <text x="652" y="420" text-anchor="middle" class="section-header" fill="#2a7b6f">OFF THE BEATEN PATH</text>
  <rect x="539" y="432" width="226" height="30" fill="#f0f7f5" stroke="#a0d4cc" stroke-dasharray="4"/>
  <text x="652" y="452" text-anchor="middle" class="placeholder">[Discovery title]</text>
  <rect x="539" y="470" width="226" height="120" fill="#f0f7f5" stroke="#a0d4cc" stroke-dasharray="4"/>
  <text x="652" y="520" text-anchor="middle" class="placeholder">[Unexpected finding]</text>
  <text x="652" y="540" text-anchor="middle" class="label">~75 words</text>

  <!-- ==================== SMALL SECTIONS ==================== -->
  <line x1="25" y1="605" x2="775" y2="605" stroke="#2a7b6f" stroke-width="0.5"/>

  <!-- Delayed Flights -->
  <rect x="25" y="610" width="185" height="150" fill="#fff" stroke="#2a7b6f" stroke-width="0.5"/>
  <text x="117" y="628" text-anchor="middle" class="section-header" fill="#e87461">DELAYED FLIGHTS</text>
  <rect x="35" y="640" width="165" height="110" fill="#fdf0ee" stroke="#e87461" stroke-dasharray="4"/>
  <text x="117" y="690" text-anchor="middle" class="placeholder">[What got delayed?]</text>
  <text x="117" y="710" text-anchor="middle" class="label">~40 words</text>

  <!-- Travel Companions (Kudos) -->
  <rect x="217" y="610" width="185" height="150" fill="#fff" stroke="#2a7b6f" stroke-width="0.5"/>
  <text x="310" y="628" text-anchor="middle" class="section-header" fill="#2a7b6f">TRAVEL COMPANIONS</text>
  <text x="310" y="641" text-anchor="middle" class="label">(Best travel buddy award)</text>
  <rect x="227" y="650" width="165" height="100" fill="#f0f7f5" stroke="#a0d4cc" stroke-dasharray="4"/>
  <text x="310" y="695" text-anchor="middle" class="placeholder">[Who made the trip better?]</text>

  <!-- Weather at Destination (Mood) -->
  <rect x="409" y="610" width="185" height="150" fill="#fff" stroke="#2a7b6f" stroke-width="0.5"/>
  <text x="502" y="628" text-anchor="middle" class="section-header" fill="#2a7b6f">WEATHER</text>
  <text x="502" y="641" text-anchor="middle" class="label">(At our destination)</text>
  <rect x="419" y="650" width="165" height="100" fill="#f0f7f5" stroke="#a0d4cc" stroke-dasharray="4"/>
  <text x="502" y="690" text-anchor="middle" class="placeholder">[Tropical? Clear skies?]</text>
  <text x="502" y="710" text-anchor="middle" class="placeholder">[Monsoon season?]</text>

  <!-- Coming Destinations -->
  <rect x="601" y="610" width="174" height="150" fill="#fff" stroke="#2a7b6f" stroke-width="0.5"/>
  <text x="688" y="628" text-anchor="middle" class="section-header" fill="#2a7b6f">NEXT DESTINATION</text>
  <rect x="611" y="645" width="154" height="105" fill="#f0f7f5" stroke="#a0d4cc" stroke-dasharray="4"/>
  <text x="688" y="695" text-anchor="middle" class="placeholder">[Where to next?]</text>
  <text x="688" y="715" text-anchor="middle" class="label">~40 words</text>

  <!-- ==================== BOTTOM ==================== -->
  <line x1="25" y1="765" x2="775" y2="765" stroke="#2a7b6f" stroke-width="0.5"/>

  <!-- Packing List -->
  <rect x="25" y="770" width="370" height="160" fill="#fff" stroke="#2a7b6f" stroke-width="0.5"/>
  <text x="210" y="790" text-anchor="middle" class="section-header" fill="#2a7b6f">PACKING LIST</text>
  <text x="210" y="803" text-anchor="middle" class="label">(Resources needed for next trip)</text>
  <rect x="35" y="810" width="170" height="55" fill="#f0f7f5" stroke="#a0d4cc" stroke-dasharray="4"/>
  <text x="120" y="835" text-anchor="middle" class="placeholder">[ ] ___________</text>
  <text x="120" y="850" text-anchor="middle" class="placeholder">[ ] ___________</text>
  <rect x="215" y="810" width="170" height="55" fill="#f0f7f5" stroke="#a0d4cc" stroke-dasharray="4"/>
  <text x="300" y="835" text-anchor="middle" class="placeholder">[ ] ___________</text>
  <text x="300" y="850" text-anchor="middle" class="placeholder">[ ] ___________</text>
  <rect x="35" y="870" width="345" height="50" fill="#f0f7f5" stroke="#a0d4cc" stroke-dasharray="4"/>
  <text x="210" y="898" text-anchor="middle" class="placeholder">[TRAVEL INSURANCE: What risks should we cover?]</text>

  <!-- Trip Advisor -->
  <rect x="402" y="770" width="373" height="160" fill="#fff" stroke="#2a7b6f" stroke-width="0.5"/>
  <text x="588" y="790" text-anchor="middle" class="section-header" fill="#2a7b6f">TRIP ADVISOR</text>
  <text x="588" y="803" text-anchor="middle" class="label">(Sprint Rating)</text>
  <rect x="412" y="815" width="353" height="105" fill="#f0f7f5" stroke="#a0d4cc" stroke-dasharray="4"/>
  <text x="588" y="845" text-anchor="middle" class="placeholder">[Rate the Sprint Journey]</text>
  <text x="588" y="865" text-anchor="middle" class="placeholder">Planning: ___/5  Execution: ___/5</text>
  <text x="588" y="885" text-anchor="middle" class="placeholder">Teamwork: ___/5  Would travel again: Y/N</text>
  <text x="588" y="905" text-anchor="middle" class="placeholder">Overall: ___/5 stars</text>

  <!-- ==================== FOOTER ==================== -->
  <line x1="25" y1="935" x2="775" y2="935" stroke="#2a7b6f" stroke-width="0.5"/>

  <rect x="25" y="940" width="500" height="55" fill="#fff" stroke="#2a7b6f" stroke-width="0.5"/>
  <text x="275" y="960" text-anchor="middle" class="section-header" fill="#2a7b6f">OVERHEARD AT THE AIRPORT</text>
  <rect x="35" y="970" width="480" height="20" fill="#f0f7f5" stroke="#a0d4cc" stroke-dasharray="4"/>
  <text x="275" y="985" text-anchor="middle" class="placeholder">"[Best overheard quote this sprint]" - Traveler</text>

  <rect x="532" y="940" width="243" height="55" fill="#fff" stroke="#2a7b6f" stroke-width="0.5"/>
  <text x="653" y="960" text-anchor="middle" class="section-header" fill="#2a7b6f">PHOTO ALBUM</text>
  <rect x="542" y="970" width="223" height="20" fill="#f0f7f5" stroke="#a0d4cc" stroke-dasharray="4"/>
  <text x="653" y="985" text-anchor="middle" class="placeholder">[Sketch a memory!]</text>

  <text x="400" y="1015" text-anchor="middle" class="meta">Published by [Company] Travel Press | Luggage not guaranteed | All journeys are one-way</text>
  <text x="765" y="1070" text-anchor="end" class="meta">Issue [X] | Bon voyage!</text>

  <!-- Corner decorations - leaf/travel style -->
  <path d="M 30 30 Q 40 30 40 40 Q 30 40 30 30" fill="#2a7b6f" opacity="0.3"/>
  <path d="M 770 30 Q 760 30 760 40 Q 770 40 770 30" fill="#2a7b6f" opacity="0.3"/>
  <path d="M 30 1070 Q 40 1070 40 1060 Q 30 1060 30 1070" fill="#2a7b6f" opacity="0.3"/>
  <path d="M 770 1070 Q 760 1070 760 1060 Q 770 1060 770 1070" fill="#2a7b6f" opacity="0.3"/>

  <text x="35" y="1035" class="label">Travelers: _________________ | Tour Guide: _________________ | Passport: Valid for [X] sprints</text>
</svg>
