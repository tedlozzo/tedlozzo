<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 1100" width="800" height="1100">
  <defs>
    <style>
      .masthead { font-family: 'Palatino Linotype', 'Book Antiqua', Palatino, serif; font-size: 36px; font-weight: bold; }
      .tagline { font-family: 'Palatino Linotype', Palatino, serif; font-size: 11px; font-style: italic; }
      .meta { font-family: 'Courier New', monospace; font-size: 10px; }
      .section-header { font-family: 'Palatino Linotype', Palatino, serif; font-size: 13px; font-weight: bold; text-transform: uppercase; letter-spacing: 2px; }
      .headline-main { font-family: 'Palatino Linotype', Palatino, serif; font-size: 28px; font-weight: bold; }
      .headline-sub { font-family: 'Palatino Linotype', Palatino, serif; font-size: 16px; font-weight: bold; }
      .headline-small { font-family: 'Palatino Linotype', Palatino, serif; font-size: 13px; font-weight: bold; }
      .body-text { font-family: 'Palatino Linotype', Palatino, serif; font-size: 10px; }
      .placeholder { font-family: 'Courier New', monospace; font-size: 10px; fill: #5577aa; font-style: italic; }
      .label { font-family: 'Courier New', monospace; font-size: 8px; fill: #666; }
    </style>
  </defs>

  <!-- Background - clean paper -->
  <rect width="800" height="1100" fill="#fafafa"/>

  <!-- Border - academic double line -->
  <rect x="15" y="15" width="770" height="1070" fill="none" stroke="#2c3e6b" stroke-width="2"/>
  <rect x="20" y="20" width="760" height="1060" fill="none" stroke="#2c3e6b" stroke-width="0.5"/>

  <!-- Masthead -->
  <rect x="25" y="25" width="750" height="80" fill="#2c3e6b"/>
  <text x="400" y="58" text-anchor="middle" class="masthead" fill="#fff">[YOUR JOURNAL NAME]</text>
  <text x="400" y="78" text-anchor="middle" class="tagline" fill="#a0b4d4">[Your department tagline]</text>

  <!-- Meta line -->
  <rect x="25" y="105" width="750" height="20" fill="#e8edf5"/>
  <text x="35" y="118" class="meta">Vol. [X] | Sprint [XX] | [Date]</text>
  <text x="765" y="118" text-anchor="end" class="meta">[Team Name] | [Company] | ISSN: 0000-SPRINT</text>

  <!-- Peer reviewed badge -->
  <rect x="710" y="35" width="55" height="55" rx="3" fill="none" stroke="#a0b4d4" stroke-width="1.5"/>
  <text x="737" y="58" text-anchor="middle" fill="#a0b4d4" font-size="7" font-family="monospace">PEER</text>
  <text x="737" y="68" text-anchor="middle" fill="#a0b4d4" font-size="7" font-family="monospace">REVIEWED</text>
  <text x="737" y="82" text-anchor="middle" fill="#a0b4d4" font-size="10" font-family="serif">*</text>

  <!-- ==================== BREAKTHROUGH DISCOVERY ==================== -->
  <rect x="25" y="130" width="750" height="260" fill="#fff" stroke="#2c3e6b" stroke-width="0.5"/>
  <text x="400" y="155" text-anchor="middle" class="section-header" fill="#2c3e6b">BREAKTHROUGH DISCOVERY</text>
  <line x1="280" y1="160" x2="520" y2="160" stroke="#2c3e6b" stroke-width="0.5"/>

  <rect x="40" y="170" width="720" height="50" fill="#f0f3f9" stroke="#b0c4de" stroke-dasharray="4"/>
  <text x="400" y="200" text-anchor="middle" class="placeholder">[MAIN FINDING - What did we discover this sprint?]</text>

  <rect x="40" y="230" width="350" height="145" fill="#f0f3f9" stroke="#b0c4de" stroke-dasharray="4"/>
  <text x="215" y="260" text-anchor="middle" class="placeholder">[Research summary]</text>
  <text x="215" y="278" text-anchor="middle" class="placeholder">What was the hypothesis? What did we find?</text>
  <text x="215" y="296" text-anchor="middle" class="placeholder">What evidence supports this?</text>
  <text x="215" y="320" text-anchor="middle" class="label">~100-150 words</text>

  <rect x="410" y="230" width="350" height="145" fill="#f0f3f9" stroke="#b0c4de" stroke-dasharray="4"/>
  <text x="585" y="300" text-anchor="middle" class="placeholder">[Data Visualization / Diagram]</text>
  <text x="585" y="320" text-anchor="middle" class="label">Chart, graph, or sketch your findings</text>

  <!-- ==================== SECONDARY SECTIONS ==================== -->
  <line x1="25" y1="395" x2="775" y2="395" stroke="#2c3e6b" stroke-width="0.5"/>

  <!-- Peer Review -->
  <rect x="25" y="400" width="245" height="200" fill="#fff" stroke="#2c3e6b" stroke-width="0.5"/>
  <text x="147" y="420" text-anchor="middle" class="section-header" fill="#2c3e6b">PEER REVIEW</text>
  <rect x="35" y="430" width="225" height="30" fill="#f0f3f9" stroke="#b0c4de" stroke-dasharray="4"/>
  <text x="147" y="450" text-anchor="middle" class="placeholder">[Title]</text>
  <rect x="35" y="470" width="225" height="120" fill="#f0f3f9" stroke="#b0c4de" stroke-dasharray="4"/>
  <text x="147" y="520" text-anchor="middle" class="placeholder">[Feedback / review findings]</text>
  <text x="147" y="540" text-anchor="middle" class="label">~75 words</text>

  <!-- Lab Notes -->
  <rect x="277" y="400" width="245" height="200" fill="#fff" stroke="#2c3e6b" stroke-width="0.5"/>
  <text x="400" y="420" text-anchor="middle" class="section-header" fill="#2c3e6b">LAB NOTES</text>
  <rect x="287" y="430" width="225" height="30" fill="#f0f3f9" stroke="#b0c4de" stroke-dasharray="4"/>
  <text x="400" y="450" text-anchor="middle" class="placeholder">[Title]</text>
  <rect x="287" y="470" width="225" height="120" fill="#f0f3f9" stroke="#b0c4de" stroke-dasharray="4"/>
  <text x="400" y="520" text-anchor="middle" class="placeholder">[Technical deep-dive]</text>
  <text x="400" y="540" text-anchor="middle" class="label">~75 words</text>

  <!-- Hypothesis vs Reality -->
  <rect x="529" y="400" width="246" height="200" fill="#fff" stroke="#2c3e6b" stroke-width="0.5"/>
  <text x="652" y="420" text-anchor="middle" class="section-header" fill="#2c3e6b">HYPOTHESIS vs REALITY</text>
  <rect x="539" y="435" width="226" height="55" fill="#e8f5e9" stroke="#b0c4de" stroke-dasharray="4"/>
  <text x="652" y="458" text-anchor="middle" class="placeholder">[We predicted...]</text>
  <text x="652" y="472" text-anchor="middle" class="label">What we thought would happen</text>
  <rect x="539" y="500" width="226" height="55" fill="#fce4ec" stroke="#b0c4de" stroke-dasharray="4"/>
  <text x="652" y="523" text-anchor="middle" class="placeholder">[What actually happened...]</text>
  <text x="652" y="537" text-anchor="middle" class="label">The real outcome</text>
  <rect x="539" y="565" width="226" height="28" fill="#f0f3f9" stroke="#b0c4de" stroke-dasharray="4"/>
  <text x="652" y="583" text-anchor="middle" class="placeholder">[Key learning]</text>

  <!-- ==================== SMALL SECTIONS ==================== -->
  <line x1="25" y1="605" x2="775" y2="605" stroke="#2c3e6b" stroke-width="0.5"/>

  <!-- Side Effects -->
  <rect x="25" y="610" width="185" height="150" fill="#fff" stroke="#2c3e6b" stroke-width="0.5"/>
  <text x="117" y="628" text-anchor="middle" class="section-header" fill="#2c3e6b">SIDE EFFECTS</text>
  <rect x="35" y="640" width="165" height="110" fill="#fff3e0" stroke="#b0c4de" stroke-dasharray="4"/>
  <text x="117" y="690" text-anchor="middle" class="placeholder">[Unintended consequences]</text>
  <text x="117" y="710" text-anchor="middle" class="label">~40 words</text>

  <!-- Lab Safety (Kudos) -->
  <rect x="217" y="610" width="185" height="150" fill="#fff" stroke="#2c3e6b" stroke-width="0.5"/>
  <text x="310" y="628" text-anchor="middle" class="section-header" fill="#2c3e6b">LAB SAFETY</text>
  <text x="310" y="641" text-anchor="middle" class="label">(Who kept us safe?)</text>
  <rect x="227" y="650" width="165" height="100" fill="#e8f5e9" stroke="#b0c4de" stroke-dasharray="4"/>
  <text x="310" y="695" text-anchor="middle" class="placeholder">[Safety award recipient]</text>
  <text x="310" y="715" text-anchor="middle" class="label">~40 words</text>

  <!-- Lab Conditions (Mood) -->
  <rect x="409" y="610" width="185" height="150" fill="#fff" stroke="#2c3e6b" stroke-width="0.5"/>
  <text x="502" y="628" text-anchor="middle" class="section-header" fill="#2c3e6b">LAB CONDITIONS</text>
  <text x="502" y="641" text-anchor="middle" class="label">(Team Atmosphere)</text>
  <rect x="419" y="650" width="165" height="100" fill="#f0f3f9" stroke="#b0c4de" stroke-dasharray="4"/>
  <text x="502" y="690" text-anchor="middle" class="placeholder">[Temperature? Pressure?]</text>
  <text x="502" y="710" text-anchor="middle" class="placeholder">Stable? Volatile? Reactive?</text>

  <!-- Upcoming Experiments -->
  <rect x="601" y="610" width="174" height="150" fill="#fff" stroke="#2c3e6b" stroke-width="0.5"/>
  <text x="688" y="628" text-anchor="middle" class="section-header" fill="#2c3e6b">UPCOMING EXPERIMENTS</text>
  <rect x="611" y="645" width="154" height="105" fill="#f0f3f9" stroke="#b0c4de" stroke-dasharray="4"/>
  <text x="688" y="695" text-anchor="middle" class="placeholder">[Next sprint research]</text>
  <text x="688" y="715" text-anchor="middle" class="label">~40 words</text>

  <!-- ==================== BOTTOM ==================== -->
  <line x1="25" y1="765" x2="775" y2="765" stroke="#2c3e6b" stroke-width="0.5"/>

  <!-- Research Grants -->
  <rect x="25" y="770" width="370" height="160" fill="#fff" stroke="#2c3e6b" stroke-width="0.5"/>
  <text x="210" y="790" text-anchor="middle" class="section-header" fill="#2c3e6b">RESEARCH GRANTS NEEDED</text>
  <rect x="35" y="800" width="170" height="60" fill="#f0f3f9" stroke="#b0c4de" stroke-dasharray="4"/>
  <text x="120" y="825" text-anchor="middle" class="placeholder">[FUNDING REQUEST]</text>
  <text x="120" y="840" text-anchor="middle" class="label">What resources do you need?</text>
  <rect x="215" y="800" width="170" height="60" fill="#f0f3f9" stroke="#b0c4de" stroke-dasharray="4"/>
  <text x="300" y="825" text-anchor="middle" class="placeholder">[EQUIPMENT NEEDED]</text>
  <text x="300" y="840" text-anchor="middle" class="label">Tools, access, training?</text>
  <rect x="35" y="865" width="170" height="55" fill="#f0f3f9" stroke="#b0c4de" stroke-dasharray="4"/>
  <text x="120" y="895" text-anchor="middle" class="placeholder">[COLLABORATION WANTED]</text>
  <rect x="215" y="865" width="170" height="55" fill="#f0f3f9" stroke="#b0c4de" stroke-dasharray="4"/>
  <text x="300" y="895" text-anchor="middle" class="placeholder">[OPEN POSITION]</text>

  <!-- Metrics & Data -->
  <rect x="402" y="770" width="373" height="160" fill="#fff" stroke="#2c3e6b" stroke-width="0.5"/>
  <text x="588" y="790" text-anchor="middle" class="section-header" fill="#2c3e6b">METRICS &amp; DATA</text>
  <text x="588" y="803" text-anchor="middle" class="label">(Experimental Results)</text>
  <rect x="412" y="815" width="353" height="105" fill="#f0f3f9" stroke="#b0c4de" stroke-dasharray="4"/>
  <text x="588" y="850" text-anchor="middle" class="placeholder">[Sprint Data]</text>
  <text x="588" y="870" text-anchor="middle" class="placeholder">Experiments run: ___  Hypotheses tested: ___</text>
  <text x="588" y="890" text-anchor="middle" class="placeholder">Breakthroughs: ___  Failed experiments: ___</text>

  <!-- ==================== FOOTER ==================== -->
  <line x1="25" y1="935" x2="775" y2="935" stroke="#2c3e6b" stroke-width="0.5"/>

  <rect x="25" y="940" width="500" height="55" fill="#fff" stroke="#2c3e6b" stroke-width="0.5"/>
  <text x="275" y="960" text-anchor="middle" class="section-header" fill="#2c3e6b">ABSTRACT OF THE SPRINT</text>
  <rect x="35" y="970" width="480" height="20" fill="#f0f3f9" stroke="#b0c4de" stroke-dasharray="4"/>
  <text x="275" y="985" text-anchor="middle" class="placeholder">"[Key takeaway in one sentence]" - Researcher</text>

  <rect x="532" y="940" width="243" height="55" fill="#fff" stroke="#2c3e6b" stroke-width="0.5"/>
  <text x="653" y="960" text-anchor="middle" class="section-header" fill="#2c3e6b">CONFERENCE POSTER</text>
  <rect x="542" y="970" width="223" height="20" fill="#f0f3f9" stroke="#b0c4de" stroke-dasharray="4"/>
  <text x="653" y="985" text-anchor="middle" class="placeholder">[Sketch your findings!]</text>

  <text x="400" y="1015" text-anchor="middle" class="meta">Published by [Company] Research Labs | Peer review pending | Impact factor: TBD</text>
  <text x="765" y="1070" text-anchor="end" class="meta">Page 1 of 1 | DOI: 10.sprint/[XX]</text>

  <!-- Corners - subtle academic -->
  <line x1="28" y1="28" x2="48" y2="28" stroke="#2c3e6b" stroke-width="2"/>
  <line x1="28" y1="28" x2="28" y2="48" stroke="#2c3e6b" stroke-width="2"/>
  <line x1="772" y1="28" x2="752" y2="28" stroke="#2c3e6b" stroke-width="2"/>
  <line x1="772" y1="28" x2="772" y2="48" stroke="#2c3e6b" stroke-width="2"/>
  <line x1="28" y1="1072" x2="48" y2="1072" stroke="#2c3e6b" stroke-width="2"/>
  <line x1="28" y1="1072" x2="28" y2="1052" stroke="#2c3e6b" stroke-width="2"/>
  <line x1="772" y1="1072" x2="752" y2="1072" stroke="#2c3e6b" stroke-width="2"/>
  <line x1="772" y1="1072" x2="772" y2="1052" stroke="#2c3e6b" stroke-width="2"/>

  <text x="35" y="1035" class="label">Researchers: _________________ | Lab Director: _________________ | Submission: Sprint [XX]</text>
</svg>
