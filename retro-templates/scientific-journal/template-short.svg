<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 780" width="800" height="780">
  <defs>
    <style>
      .masthead { font-family: 'Palatino Linotype', 'Book Antiqua', Palatino, serif; font-size: 36px; font-weight: bold; }
      .tagline { font-family: 'Palatino Linotype', Palatino, serif; font-size: 11px; font-style: italic; }
      .meta { font-family: 'Courier New', monospace; font-size: 10px; }
      .section-header { font-family: 'Palatino Linotype', Palatino, serif; font-size: 13px; font-weight: bold; text-transform: uppercase; letter-spacing: 2px; }
      .headline-main { font-family: 'Palatino Linotype', Palatino, serif; font-size: 28px; font-weight: bold; }
      .headline-sub { font-family: 'Palatino Linotype', Palatino, serif; font-size: 16px; font-weight: bold; }
      .headline-small { font-family: 'Palatino Linotype', Palatino, serif; font-size: 13px; font-weight: bold; }
      .body-text { font-family: 'Palatino Linotype', Palatino, serif; font-size: 10px; }
      .placeholder { font-family: 'Courier New', monospace; font-size: 10px; fill: #5577aa; font-style: italic; }
      .label { font-family: 'Courier New', monospace; font-size: 8px; fill: #666; }
    </style>
  </defs>

  <!-- Background - clean paper -->
  <rect width="800" height="780" fill="#fafafa"/>

  <!-- Border - academic double line -->
  <rect x="15" y="15" width="770" height="750" fill="none" stroke="#2c3e6b" stroke-width="2"/>
  <rect x="20" y="20" width="760" height="740" fill="none" stroke="#2c3e6b" stroke-width="0.5"/>

  <!-- Masthead -->
  <rect x="25" y="25" width="750" height="80" fill="#2c3e6b"/>
  <text x="400" y="58" text-anchor="middle" class="masthead" fill="#fff">[YOUR JOURNAL NAME]</text>
  <text x="400" y="78" text-anchor="middle" class="tagline" fill="#a0b4d4">[Your department tagline]</text>

  <!-- Meta line -->
  <rect x="25" y="105" width="750" height="20" fill="#e8edf5"/>
  <text x="35" y="118" class="meta">Vol. [X] | Sprint [XX] | [Date]</text>
  <text x="765" y="118" text-anchor="end" class="meta">[Team Name] | [Company] | ISSN: 0000-SPRINT</text>

  <!-- Peer reviewed badge -->
  <rect x="710" y="35" width="55" height="55" rx="3" fill="none" stroke="#a0b4d4" stroke-width="1.5"/>
  <text x="737" y="58" text-anchor="middle" fill="#a0b4d4" font-size="7" font-family="monospace">PEER</text>
  <text x="737" y="68" text-anchor="middle" fill="#a0b4d4" font-size="7" font-family="monospace">REVIEWED</text>
  <text x="737" y="82" text-anchor="middle" fill="#a0b4d4" font-size="10" font-family="serif">*</text>

  <!-- ==================== BREAKTHROUGH DISCOVERY ==================== -->
  <rect x="25" y="130" width="750" height="260" fill="#fff" stroke="#2c3e6b" stroke-width="0.5"/>
  <text x="400" y="155" text-anchor="middle" class="section-header" fill="#2c3e6b">BREAKTHROUGH DISCOVERY</text>
  <line x1="280" y1="160" x2="520" y2="160" stroke="#2c3e6b" stroke-width="0.5"/>

  <rect x="40" y="170" width="720" height="50" fill="#f0f3f9" stroke="#b0c4de" stroke-dasharray="4"/>
  <text x="400" y="200" text-anchor="middle" class="placeholder">[MAIN FINDING - What did we discover this sprint?]</text>

  <rect x="40" y="230" width="350" height="145" fill="#f0f3f9" stroke="#b0c4de" stroke-dasharray="4"/>
  <text x="215" y="260" text-anchor="middle" class="placeholder">[Research summary]</text>
  <text x="215" y="278" text-anchor="middle" class="placeholder">What was the hypothesis? What did we find?</text>
  <text x="215" y="296" text-anchor="middle" class="placeholder">What evidence supports this?</text>
  <text x="215" y="320" text-anchor="middle" class="label">~100-150 words</text>

  <rect x="410" y="230" width="350" height="145" fill="#f0f3f9" stroke="#b0c4de" stroke-dasharray="4"/>
  <text x="585" y="300" text-anchor="middle" class="placeholder">[Data Visualization / Diagram]</text>
  <text x="585" y="320" text-anchor="middle" class="label">Chart, graph, or sketch your findings</text>

  <!-- ==================== SMALL SECTIONS ==================== -->
  <line x1="25" y1="395" x2="775" y2="395" stroke="#2c3e6b" stroke-width="0.5"/>

  <!-- Side Effects -->
  <rect x="25" y="400" width="185" height="150" fill="#fff" stroke="#2c3e6b" stroke-width="0.5"/>
  <text x="117" y="418" text-anchor="middle" class="section-header" fill="#2c3e6b">SIDE EFFECTS</text>
  <rect x="35" y="430" width="165" height="110" fill="#fff3e0" stroke="#b0c4de" stroke-dasharray="4"/>
  <text x="117" y="480" text-anchor="middle" class="placeholder">[Unintended consequences]</text>
  <text x="117" y="500" text-anchor="middle" class="label">~40 words</text>

  <!-- Lab Safety (Kudos) -->
  <rect x="217" y="400" width="185" height="150" fill="#fff" stroke="#2c3e6b" stroke-width="0.5"/>
  <text x="310" y="418" text-anchor="middle" class="section-header" fill="#2c3e6b">LAB SAFETY</text>
  <text x="310" y="431" text-anchor="middle" class="label">(Who kept us safe?)</text>
  <rect x="227" y="440" width="165" height="100" fill="#e8f5e9" stroke="#b0c4de" stroke-dasharray="4"/>
  <text x="310" y="485" text-anchor="middle" class="placeholder">[Safety award recipient]</text>
  <text x="310" y="505" text-anchor="middle" class="label">~40 words</text>

  <!-- Lab Conditions (Mood) -->
  <rect x="409" y="400" width="185" height="150" fill="#fff" stroke="#2c3e6b" stroke-width="0.5"/>
  <text x="502" y="418" text-anchor="middle" class="section-header" fill="#2c3e6b">LAB CONDITIONS</text>
  <text x="502" y="431" text-anchor="middle" class="label">(Team Atmosphere)</text>
  <rect x="419" y="440" width="165" height="100" fill="#f0f3f9" stroke="#b0c4de" stroke-dasharray="4"/>
  <text x="502" y="480" text-anchor="middle" class="placeholder">[Temperature? Pressure?]</text>
  <text x="502" y="500" text-anchor="middle" class="placeholder">Stable? Volatile? Reactive?</text>

  <!-- Upcoming Experiments -->
  <rect x="601" y="400" width="174" height="150" fill="#fff" stroke="#2c3e6b" stroke-width="0.5"/>
  <text x="688" y="418" text-anchor="middle" class="section-header" fill="#2c3e6b">UPCOMING EXPERIMENTS</text>
  <rect x="611" y="435" width="154" height="105" fill="#f0f3f9" stroke="#b0c4de" stroke-dasharray="4"/>
  <text x="688" y="485" text-anchor="middle" class="placeholder">[Next sprint research]</text>
  <text x="688" y="505" text-anchor="middle" class="label">~40 words</text>

  <!-- ==================== BOTTOM - SIMPLIFIED ==================== -->
  <line x1="25" y1="555" x2="775" y2="555" stroke="#2c3e6b" stroke-width="0.5"/>

  <rect x="25" y="560" width="750" height="110" fill="#fff" stroke="#2c3e6b" stroke-width="0.5"/>
  <text x="400" y="580" text-anchor="middle" class="section-header" fill="#2c3e6b">RESEARCH GRANTS &amp; DATA</text>
  <line x1="300" y1="585" x2="500" y2="585" stroke="#2c3e6b" stroke-width="0.5"/>

  <!-- Left half - Grants -->
  <rect x="35" y="595" width="355" height="65" fill="#f0f3f9" stroke="#b0c4de" stroke-dasharray="4"/>
  <text x="212" y="622" text-anchor="middle" class="placeholder">[FUNDING REQUESTS - Resources, tools, training needed]</text>
  <text x="212" y="640" text-anchor="middle" class="label">What does the lab need?</text>

  <!-- Right half - Metrics -->
  <rect x="405" y="595" width="360" height="65" fill="#f0f3f9" stroke="#b0c4de" stroke-dasharray="4"/>
  <text x="585" y="618" text-anchor="middle" class="placeholder">[SPRINT DATA]</text>
  <text x="585" y="636" text-anchor="middle" class="placeholder">Experiments: ___  Breakthroughs: ___  Failed: ___</text>

  <!-- ==================== FOOTER ==================== -->
  <line x1="25" y1="675" x2="775" y2="675" stroke="#2c3e6b" stroke-width="0.5"/>

  <rect x="25" y="680" width="750" height="55" fill="#fff" stroke="#2c3e6b" stroke-width="0.5"/>
  <text x="400" y="700" text-anchor="middle" class="section-header" fill="#2c3e6b">ABSTRACT OF THE SPRINT</text>
  <rect x="35" y="710" width="730" height="20" fill="#f0f3f9" stroke="#b0c4de" stroke-dasharray="4"/>
  <text x="400" y="725" text-anchor="middle" class="placeholder">"[Key takeaway in one sentence]" - Researcher</text>

  <text x="400" y="752" text-anchor="middle" class="meta">Published by [Company] Research Labs | Peer review pending | Impact factor: TBD</text>

  <!-- Corners - subtle academic -->
  <line x1="28" y1="28" x2="48" y2="28" stroke="#2c3e6b" stroke-width="2"/>
  <line x1="28" y1="28" x2="28" y2="48" stroke="#2c3e6b" stroke-width="2"/>
  <line x1="772" y1="28" x2="752" y2="28" stroke="#2c3e6b" stroke-width="2"/>
  <line x1="772" y1="28" x2="772" y2="48" stroke="#2c3e6b" stroke-width="2"/>
  <line x1="28" y1="752" x2="48" y2="752" stroke="#2c3e6b" stroke-width="2"/>
  <line x1="28" y1="752" x2="28" y2="732" stroke="#2c3e6b" stroke-width="2"/>
  <line x1="772" y1="752" x2="752" y2="752" stroke="#2c3e6b" stroke-width="2"/>
  <line x1="772" y1="752" x2="772" y2="732" stroke="#2c3e6b" stroke-width="2"/>

  <text x="35" y="752" class="label">Researchers: _________________ | Lab Director: _________________ | Submission: Sprint [XX]</text>
</svg>