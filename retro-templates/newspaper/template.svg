<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 1100" width="800" height="1100">
  <defs>
    <style>
      .masthead { font-family: 'Times New Roman', Georgia, serif; font-size: 48px; font-weight: bold; }
      .tagline { font-family: 'Times New Roman', Georgia, serif; font-size: 12px; font-style: italic; }
      .date { font-family: 'Times New Roman', Georgia, serif; font-size: 10px; }
      .section-header { font-family: 'Times New Roman', Georgia, serif; font-size: 14px; font-weight: bold; text-transform: uppercase; }
      .headline-main { font-family: 'Times New Roman', Georgia, serif; font-size: 32px; font-weight: bold; }
      .headline-sub { font-family: 'Times New Roman', Georgia, serif; font-size: 18px; font-weight: bold; }
      .headline-small { font-family: 'Times New Roman', Georgia, serif; font-size: 14px; font-weight: bold; }
      .body-text { font-family: 'Times New Roman', Georgia, serif; font-size: 10px; }
      .placeholder { font-family: Arial, sans-serif; font-size: 11px; fill: #888; font-style: italic; }
      .label { font-family: Arial, sans-serif; font-size: 9px; fill: #666; }
    </style>
  </defs>

  <!-- Background - aged newspaper -->
  <rect width="800" height="1100" fill="#f5f0e1"/>

  <!-- Border -->
  <rect x="15" y="15" width="770" height="1070" fill="none" stroke="#000" stroke-width="2"/>
  <rect x="20" y="20" width="760" height="1060" fill="none" stroke="#000" stroke-width="1"/>

  <!-- Masthead -->
  <rect x="25" y="25" width="750" height="80" fill="#fff" stroke="#000" stroke-width="1"/>
  <text x="400" y="65" text-anchor="middle" class="masthead">[YOUR NEWSPAPER NAME]</text>
  <text x="400" y="82" text-anchor="middle" class="tagline">"[Your tagline here]"</text>

  <!-- Date line -->
  <line x1="25" y1="105" x2="775" y2="105" stroke="#000" stroke-width="2"/>
  <text x="35" y="100" class="date">Sprint [XX] Edition | [Date]</text>
  <text x="765" y="100" text-anchor="end" class="date">[Team Name] | [Company]</text>

  <!-- Price badge -->
  <circle cx="750" cy="55" r="20" fill="#000"/>
  <text x="750" y="52" text-anchor="middle" fill="#fff" font-size="8" font-family="Arial">FREE</text>
  <text x="750" y="62" text-anchor="middle" fill="#fff" font-size="7" font-family="Arial">(always)</text>

  <!-- ==================== FRONT PAGE ==================== -->
  <rect x="25" y="110" width="750" height="280" fill="#fff" stroke="#000" stroke-width="1"/>

  <text x="400" y="145" text-anchor="middle" class="section-header">FRONT PAGE</text>
  <line x1="300" y1="150" x2="500" y2="150" stroke="#000" stroke-width="1"/>

  <rect x="40" y="165" width="720" height="60" fill="#f9f9f0" stroke="#ccc" stroke-dasharray="4"/>
  <text x="400" y="200" text-anchor="middle" class="placeholder">[MAIN HEADLINE - Your biggest story this sprint]</text>

  <rect x="40" y="235" width="350" height="140" fill="#f9f9f0" stroke="#ccc" stroke-dasharray="4"/>
  <text x="215" y="260" text-anchor="middle" class="placeholder">[Main article body]</text>
  <text x="215" y="280" text-anchor="middle" class="placeholder">What happened? Why does it matter?</text>
  <text x="215" y="300" text-anchor="middle" class="placeholder">Who was involved? What did you learn?</text>
  <text x="215" y="320" text-anchor="middle" class="label">~100-150 words</text>

  <rect x="410" y="235" width="350" height="140" fill="#e8e8e8" stroke="#ccc" stroke-dasharray="4"/>
  <text x="585" y="305" text-anchor="middle" class="placeholder">[Image / Diagram / Meme]</text>
  <text x="585" y="325" text-anchor="middle" class="label">Draw, paste, or screenshot something!</text>

  <!-- ==================== SECONDARY STORIES ==================== -->
  <line x1="25" y1="395" x2="775" y2="395" stroke="#000" stroke-width="1"/>

  <!-- Feature -->
  <rect x="25" y="400" width="245" height="200" fill="#fff" stroke="#000" stroke-width="1"/>
  <text x="147" y="420" text-anchor="middle" class="section-header">FEATURE</text>
  <rect x="35" y="430" width="225" height="30" fill="#f9f9f0" stroke="#ccc" stroke-dasharray="4"/>
  <text x="147" y="450" text-anchor="middle" class="placeholder">[Headline]</text>
  <rect x="35" y="470" width="225" height="120" fill="#f9f9f0" stroke="#ccc" stroke-dasharray="4"/>
  <text x="147" y="520" text-anchor="middle" class="placeholder">[Your feature article]</text>
  <text x="147" y="540" text-anchor="middle" class="label">~75 words</text>

  <!-- Tech Corner -->
  <rect x="277" y="400" width="245" height="200" fill="#fff" stroke="#000" stroke-width="1"/>
  <text x="400" y="420" text-anchor="middle" class="section-header">TECH CORNER</text>
  <rect x="287" y="430" width="225" height="30" fill="#f9f9f0" stroke="#ccc" stroke-dasharray="4"/>
  <text x="400" y="450" text-anchor="middle" class="placeholder">[Headline]</text>
  <rect x="287" y="470" width="225" height="120" fill="#f9f9f0" stroke="#ccc" stroke-dasharray="4"/>
  <text x="400" y="520" text-anchor="middle" class="placeholder">[Technical deep-dive]</text>
  <text x="400" y="540" text-anchor="middle" class="label">~75 words</text>

  <!-- Opinion -->
  <rect x="529" y="400" width="246" height="200" fill="#fff" stroke="#000" stroke-width="1"/>
  <text x="652" y="420" text-anchor="middle" class="section-header">OPINION</text>
  <rect x="539" y="430" width="226" height="30" fill="#f9f9f0" stroke="#ccc" stroke-dasharray="4"/>
  <text x="652" y="450" text-anchor="middle" class="placeholder">[Headline]</text>
  <rect x="539" y="470" width="226" height="120" fill="#f9f9f0" stroke="#ccc" stroke-dasharray="4"/>
  <text x="652" y="520" text-anchor="middle" class="placeholder">[Your hot take]</text>
  <text x="652" y="540" text-anchor="middle" class="label">~75 words</text>

  <!-- ==================== SMALL STORIES ==================== -->
  <line x1="25" y1="605" x2="775" y2="605" stroke="#000" stroke-width="1"/>

  <rect x="25" y="610" width="185" height="150" fill="#fff" stroke="#000" stroke-width="1"/>
  <text x="117" y="628" text-anchor="middle" class="section-header">IN BRIEF</text>
  <rect x="35" y="640" width="165" height="110" fill="#f9f9f0" stroke="#ccc" stroke-dasharray="4"/>
  <text x="117" y="690" text-anchor="middle" class="placeholder">[Quick update]</text>
  <text x="117" y="710" text-anchor="middle" class="label">~40 words</text>

  <rect x="217" y="610" width="185" height="150" fill="#fff" stroke="#000" stroke-width="1"/>
  <text x="310" y="628" text-anchor="middle" class="section-header">KUDOS</text>
  <rect x="227" y="640" width="165" height="110" fill="#f9f9f0" stroke="#ccc" stroke-dasharray="4"/>
  <text x="310" y="690" text-anchor="middle" class="placeholder">[Shout-out someone!]</text>
  <text x="310" y="710" text-anchor="middle" class="label">~40 words</text>

  <rect x="409" y="610" width="185" height="150" fill="#fff" stroke="#000" stroke-width="1"/>
  <text x="502" y="628" text-anchor="middle" class="section-header">WEATHER</text>
  <text x="502" y="642" text-anchor="middle" class="label">(Team Mood Report)</text>
  <rect x="419" y="655" width="165" height="95" fill="#f9f9f0" stroke="#ccc" stroke-dasharray="4"/>
  <text x="502" y="695" text-anchor="middle" class="placeholder">[How's the team feeling?]</text>
  <text x="502" y="715" text-anchor="middle" class="placeholder">Sunny? Cloudy? Stormy?</text>

  <rect x="601" y="610" width="174" height="150" fill="#fff" stroke="#000" stroke-width="1"/>
  <text x="688" y="628" text-anchor="middle" class="section-header">COMING SOON</text>
  <rect x="611" y="640" width="154" height="110" fill="#f9f9f0" stroke="#ccc" stroke-dasharray="4"/>
  <text x="688" y="690" text-anchor="middle" class="placeholder">[Next sprint preview]</text>
  <text x="688" y="710" text-anchor="middle" class="label">~40 words</text>

  <!-- ==================== BOTTOM ==================== -->
  <line x1="25" y1="765" x2="775" y2="765" stroke="#000" stroke-width="1"/>

  <!-- Classifieds -->
  <rect x="25" y="770" width="370" height="160" fill="#fff" stroke="#000" stroke-width="1"/>
  <text x="210" y="790" text-anchor="middle" class="section-header">CLASSIFIEDS</text>
  <rect x="35" y="800" width="170" height="60" fill="#f9f9f0" stroke="#ccc" stroke-dasharray="4"/>
  <text x="120" y="820" text-anchor="middle" class="placeholder">[WANTED]</text>
  <text x="120" y="835" text-anchor="middle" class="label">What do you need?</text>
  <rect x="215" y="800" width="170" height="60" fill="#f9f9f0" stroke="#ccc" stroke-dasharray="4"/>
  <text x="300" y="820" text-anchor="middle" class="placeholder">[FOR TRADE]</text>
  <text x="300" y="835" text-anchor="middle" class="label">What can you offer?</text>
  <rect x="35" y="865" width="170" height="55" fill="#f9f9f0" stroke="#ccc" stroke-dasharray="4"/>
  <text x="120" y="890" text-anchor="middle" class="placeholder">[HELP NEEDED]</text>
  <rect x="215" y="865" width="170" height="55" fill="#f9f9f0" stroke="#ccc" stroke-dasharray="4"/>
  <text x="300" y="890" text-anchor="middle" class="placeholder">[ANNOUNCEMENT]</text>

  <!-- Sports/Metrics -->
  <rect x="402" y="770" width="373" height="160" fill="#fff" stroke="#000" stroke-width="1"/>
  <text x="588" y="790" text-anchor="middle" class="section-header">SPORTS &amp; SCORES</text>
  <text x="588" y="803" text-anchor="middle" class="label">(Sprint Metrics)</text>
  <rect x="412" y="815" width="353" height="105" fill="#f9f9f0" stroke="#ccc" stroke-dasharray="4"/>
  <text x="588" y="850" text-anchor="middle" class="placeholder">[Sprint Stats]</text>
  <text x="588" y="870" text-anchor="middle" class="placeholder">Tickets closed: ___  PRs merged: ___</text>
  <text x="588" y="890" text-anchor="middle" class="placeholder">Bugs squashed: ___  Coffees consumed: ___</text>

  <!-- ==================== FOOTER ==================== -->
  <line x1="25" y1="935" x2="775" y2="935" stroke="#000" stroke-width="1"/>

  <rect x="25" y="940" width="500" height="55" fill="#fff" stroke="#000" stroke-width="1"/>
  <text x="275" y="960" text-anchor="middle" class="section-header">QUOTE OF THE SPRINT</text>
  <rect x="35" y="970" width="480" height="20" fill="#f9f9f0" stroke="#ccc" stroke-dasharray="4"/>
  <text x="275" y="985" text-anchor="middle" class="placeholder">"[Something memorable someone said]" - Name</text>

  <rect x="532" y="940" width="243" height="55" fill="#fff" stroke="#000" stroke-width="1"/>
  <text x="653" y="960" text-anchor="middle" class="section-header">COMICS</text>
  <rect x="542" y="970" width="223" height="20" fill="#f9f9f0" stroke="#ccc" stroke-dasharray="4"/>
  <text x="653" y="985" text-anchor="middle" class="placeholder">[Draw something funny!]</text>

  <!-- Footer text -->
  <text x="400" y="1015" text-anchor="middle" class="date">Printed at [Company] HQ | Not responsible for typos after 5pm | Bug reports go to /dev/null</text>
  <text x="765" y="1070" text-anchor="end" class="date">Page 1 of 1 (we're agile, not a novel)</text>

  <!-- Decorative corners -->
  <path d="M 30 30 L 50 30 L 50 35 L 35 35 L 35 50 L 30 50 Z" fill="#000"/>
  <path d="M 770 30 L 750 30 L 750 35 L 765 35 L 765 50 L 770 50 Z" fill="#000"/>
  <path d="M 30 1070 L 50 1070 L 50 1065 L 35 1065 L 35 1050 L 30 1050 Z" fill="#000"/>
  <path d="M 770 1070 L 750 1070 L 750 1065 L 765 1065 L 765 1050 L 770 1050 Z" fill="#000"/>

  <!-- Staff line -->
  <text x="35" y="1035" class="label">Staff Writers: _________________ | Editor-in-Chief: _________________ | Deadline: Never (we're in tech)</text>
</svg>
